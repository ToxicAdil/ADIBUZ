<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Adibuz — AI-first marketing agency. We build high-performing marketing systems that drive real revenue, not just clicks." />
    <meta name="theme-color" content="#3A0F63" />
    <link rel="canonical" href="https://adibuz.com/" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png?v=2" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png?v=2" />

    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=2" />
    <title>Adibuz — Scale Smarter. Grow Faster.</title>

    <!--
    ═══════════════════════════════════════════════════════════════════════
     OPEN GRAPH + TWITTER CARD (BASELINE)
    ═══════════════════════════════════════════════════════════════════════
    These baseline tags ensure social crawlers that do not execute JS
    (WhatsApp, LinkedIn, some Twitter bots) can still unfurl rich previews.
    The React Helmet <SEO /> component will overwrite these dynamically for
    sub-pages once hydrated.
    -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://adibuz.com/" />
    <meta property="og:title" content="Adibuz — Scale Smarter. Grow Faster." />
    <meta property="og:description" content="Adibuz — AI-first marketing agency. We build high-performing marketing systems that drive real revenue, not just clicks." />
    <meta property="og:image" content="https://adibuz.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Adibuz" />
    
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://adibuz.com/" />
    <meta name="twitter:title" content="Adibuz — Scale Smarter. Grow Faster." />
    <meta name="twitter:description" content="Adibuz — AI-first marketing agency. We build high-performing marketing systems that drive real revenue, not just clicks." />
    <meta name="twitter:image" content="https://adibuz.com/og-image.png" />
    <meta name="twitter:creator" content="@Adibuz_agency" />
    <meta name="twitter:site" content="@Adibuz_agency" />

    <!--
    ═══════════════════════════════════════════════════════════════════════
     SUBRESOURCE INTEGRITY (SRI) POLICY — Adibuz
    ═══════════════════════════════════════════════════════════════════════

     SRI STATUS OF ALL EXTERNAL RESOURCES IN THIS FILE:
     ──────────────────────────────────────────────────

     ✅  Silktide CSS / JS (cdn.jsdelivr.net)
         SRI applied in ConsentManager.tsx — dynamically injected with
         integrity + crossorigin="anonymous" on both <link> and <script>.
         Verified sha384 hashes (recomputed 2026-05-16):
           CSS: sha384-IO1E/jCrQXyH5rwcI0SXP7OXw47JFqQNDQcKhbFvqnL2IunBxxwE2Ne5XyAmCqKs
           JS : sha384-j4NIMOecmtzMWe9GJADIIe5hTlHG63aiTQ/2XorW10RNyQJg+IU+xwFVDy45wBah

     ❌  Google Fonts CSS (fonts.googleapis.com) — SRI intentionally NOT applied
         Reason: Google's Fonts API serves different CSS bodies per browser
         (Chrome, Safari, Firefox each receive different @font-face woff2 URLs
         optimised for that UA). The same URL returns different bytes on every
         request, so any SRI hash would cause an integrity mismatch and the fonts
         would silently fail to load. Google's own documentation explicitly
         advises against applying SRI to the Fonts API CSS endpoint.
         Security mitigation: fonts.googleapis.com is in our CSP style-src
         whitelist, and all fonts are loaded with crossorigin="anonymous" for
         CORS. The actual woff2 files live on fonts.gstatic.com (also CSP-listed).

     ❌  Cloudinary images / video — SRI intentionally NOT applied
         Reason: Cloudinary URLs include on-the-fly transformation parameters
         (f_webm, q_auto, w_800, etc.) which produce different byte sequences
         per request. Hashing is therefore impossible. Security mitigation:
         res.cloudinary.com is whitelisted in img-src and media-src CSP directives.

     ❌  Unsplash images — SRI intentionally NOT applied
         Reason: CDN-served images have Vary headers (Accept, Accept-Encoding)
         meaning byte content differs per client. Security mitigation:
         images.unsplash.com is whitelisted in img-src CSP.

     ❌  Vite-generated JS / CSS chunks — SRI intentionally NOT applied
         Reason: Vite content-hashes all chunk filenames (e.g. index-Abc123.js)
         at build time. The hash IS the integrity mechanism for Vite's output.
         Applying additional SRI would require computing hashes post-build and
         injecting them into index.html — a complex pipeline that provides no
         additional benefit since Vercel serves these over TLS with immutable
         cache headers. Adding `crossorigin` to the Vite entry point below is
         sufficient for correct CORS module loading semantics.

     ❌  Inline GCM v2 <script> — SRI not applicable
         Reason: Inline scripts cannot carry `integrity` attributes per the
         W3C SRI spec. The inline GCM script is protected by being the only
         inline script in the document; all external scripts go through the
         CSP script-src whitelist. Content is < 300 bytes and auditable directly
         in source control.
    ═══════════════════════════════════════════════════════════════════════
    -->

    <!-- ── DNS prefetch + preconnect to critical origins ─────────────── -->
    <!--
      Order matters for performance:
      1. dns-prefetch is cheap — resolves DNS for all external origins
      2. preconnect = TCP + TLS — only for the 2–3 most critical origins
      crossorigin is REQUIRED on preconnect for CORS origins (fonts, CDN)
    -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    <link rel="dns-prefetch" href="https://res.cloudinary.com" />
    <link rel="dns-prefetch" href="https://images.unsplash.com" />
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net" />

    <!-- fonts.googleapis.com: no crossorigin (serves same-origin CSS response) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <!-- fonts.gstatic.com: crossorigin REQUIRED — serves woff2 over CORS -->
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
    <!-- res.cloudinary.com: crossorigin for CORS image/video requests -->
    <link rel="preconnect" href="https://res.cloudinary.com" crossorigin="anonymous" />
    <!-- cdn.jsdelivr.net: crossorigin REQUIRED — SRI check is CORS-gated -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin="anonymous" />

    <!--
      ── Google Fonts — Non-blocking load ─────────────────────────────────
      Strategy: media="print" → onload switches to media="all"
      This is the canonical non-render-blocking font loading pattern.

      WHY NO SRI: See policy block above. Google Fonts API CSS is UA-adaptive;
      any integrity hash would break fonts across different browsers.
      Mitigation: fonts.googleapis.com is in CSP style-src allowlist.
    -->
    <!-- Preload Syncopate font CSS early — it is the LCP font on /work (PERFORMANCE & AND DESIGN headings) -->
    <link
      rel="preload"
      href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&display=swap"
      as="style"
      crossorigin="anonymous"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800;900&family=Syncopate:wght@700&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
      crossorigin="anonymous"
    />
    <!-- Noscript fallback for font loading -->
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800;900&family=Syncopate:wght@700&display=swap"
        rel="stylesheet"
        crossorigin="anonymous"
      />
    </noscript>

    <!-- Space Grotesk — only used for header badge, non-blocking -->
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
      crossorigin="anonymous"
    />

    <!-- Caveat — only used on About page, completely deferred -->
    <link
      href="https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
      crossorigin="anonymous"
    />

    <!--
      ── Critical inline CSS — Static hero shell ──────────────────────────
      Inline styles are NOT subject to SRI (SRI applies to external resources
      only). These styles are served as part of the HTML document itself and
      are therefore trusted implicitly. They are auditable in version control.
      FCP improvement: browser paints hero text BEFORE any JS loads (~0.5s).
    -->
    <style>
      /* Critical hero styles — matches React output exactly */
      *,*::before,*::after{box-sizing:border-box}
      body{margin:0;font-family:'Inter',ui-sans-serif,system-ui,sans-serif;-webkit-text-size-adjust:100%}
      #root{min-height:100vh}
      .static-hero {
        position: relative;
        width: 100%;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
        background-color: #fdfaff;
        background-image:
          radial-gradient(ellipse 85% 65% at 8% 8%, rgba(175, 109, 255, 0.20), transparent 60%),
          radial-gradient(ellipse 75% 60% at 75% 35%, rgba(255, 235, 170, 0.25), transparent 62%),
          radial-gradient(ellipse 70% 60% at 15% 80%, rgba(255, 100, 180, 0.18), transparent 62%),
          radial-gradient(ellipse 70% 60% at 92% 92%, rgba(120, 190, 255, 0.22), transparent 62%),
          linear-gradient(180deg, #faf7ff 0%, #fffaff 100%);
        overflow: hidden;
        padding: 80px 16px 40px;
        contain: layout style paint;
      }
      .static-hero-badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 16px;
        border-radius: 9999px;
        font-size: 11px;
        font-weight: 500;
        color: #64748b;
        text-transform: uppercase;
        letter-spacing: 0.2em;
        background: rgba(255,255,255,0.4);
        border: 1px solid rgba(255,255,255,0.6);
        backdrop-filter: blur(12px);
        margin-bottom: 32px;
        animation: heroFadeUp 0.8s ease-out both;
      }
      .static-hero-sub {
        display: block;
        font-size: clamp(1.2rem, 3.5vw, 2.6rem);
        font-weight: 300;
        color: #475569;
        letter-spacing: -0.025em;
        margin-bottom: 8px;
        animation: heroFadeUpLarge 1s cubic-bezier(0.16, 1, 0.3, 1) 0.1s both;
      }
      .static-hero-h1 {
        font-size: clamp(1.875rem, 7vw, 6rem);
        font-weight: 900;
        letter-spacing: -0.04em;
        line-height: 1.05;
        background: linear-gradient(135deg, #3A0F63 0%, #7C3AED 50%, #A855F7 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin: 0 0 8px;
        animation: heroScaleIn 1s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both;
      }
      .static-hero-line {
        height: 1.5px;
        max-width: 80%;
        background: linear-gradient(to right, transparent, rgba(124,58,237,0.4), transparent);
        margin: 0 auto 32px;
        animation: heroUnderline 1.2s ease-out 0.5s both;
      }
      .static-hero-p {
        font-size: clamp(1rem, 1.8vw, 1.2rem);
        color: #64748b;
        font-weight: 500;
        line-height: 1.75;
        max-width: 580px;
        margin: 0 auto 48px;
        animation: heroFadeUpLarge 1s cubic-bezier(0.16, 1, 0.3, 1) 0.4s both;
      }
      .static-hero-p .hl { color: #3A0F63; font-weight: 700; }
      .static-hero-btns {
        display: flex;
        flex-wrap: wrap;
        gap: 14px;
        justify-content: center;
        animation: heroFadeUpLarge 1s cubic-bezier(0.16, 1, 0.3, 1) 0.5s both;
      }
      .static-hero-btns a {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        padding: 16px 36px;
        border-radius: 9999px;
        font-weight: 600;
        font-size: clamp(0.85rem, 1.2vw, 1rem);
        text-decoration: none;
        transition: transform 0.2s;
        min-height: 44px;
      }
      .static-hero-btns a:first-child {
        background: #3A0F63;
        color: #fff;
        box-shadow: 0 8px 24px rgba(58,15,99,0.25);
      }
      .static-hero-btns a:last-child {
        color: #475569;
        border: 1px solid #e2e8f0;
      }
      @keyframes heroFadeUp { from { opacity:0; transform:translateY(20px) } to { opacity:1; transform:translateY(0) } }
      @keyframes heroFadeUpLarge { from { opacity:0; transform:translateY(30px) } to { opacity:1; transform:translateY(0) } }
      @keyframes heroScaleIn { from { opacity:0; transform:scale(0.95) translateY(20px) } to { opacity:1; transform:scale(1) translateY(0) } }
      @keyframes heroUnderline { from { width:0; opacity:0 } to { width:100%; opacity:1 } }
      /* Reduced motion: skip all animations */
      @media (prefers-reduced-motion: reduce) {
        .static-hero-badge,.static-hero-sub,.static-hero-h1,.static-hero-line,.static-hero-p,.static-hero-btns { animation: none; }
      }
    </style>

    <!--
      ── Google Consent Mode v2 — Inline default-deny ──────────────────────
      WHY INLINE: This script MUST execute synchronously before any analytics
      tag (GTM, GA4) fires. Placing it as an external script would add a
      network round-trip and potentially allow analytics to fire before
      consent is set. Being inline is the REQUIRED implementation pattern
      per Google's own Consent Mode v2 documentation.

      WHY NO SRI: The W3C SRI specification (section 4.3) explicitly states
      that integrity attributes are only checked on external resource requests.
      Inline scripts are not subject to SRI. They are protected by being
      version-controlled and auditable in source.

      SIZE: < 300 bytes — negligible parser cost.
    -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){window.dataLayer.push(arguments);}
      gtag('consent', 'default', {
        analytics_storage:    'denied',
        ad_storage:           'denied',
        ad_user_data:         'denied',
        ad_personalization:   'denied',
        functionality_storage:'denied',
        wait_for_update: 500
      });
    </script>

    <!-- Google Analytics 4 (GA4) - delayed so it never blocks first render -->
    <script>
      (function () {
        var loaded = false;
        var loadAnalytics = function () {
          if (loaded) return;
          loaded = true;
          ['pointerdown', 'keydown', 'scroll', 'touchstart'].forEach(function (eventName) {
            window.removeEventListener(eventName, loadAnalytics);
          });
          var script = document.createElement('script');
          script.async = true;
          script.src = 'https://www.googletagmanager.com/gtag/js?id=G-PGYSBQRNL4';
          document.head.appendChild(script);
          gtag('js', new Date());
          gtag('config', 'G-PGYSBQRNL4');
        };
        ['pointerdown', 'keydown', 'scroll', 'touchstart'].forEach(function (eventName) {
          window.addEventListener(eventName, loadAnalytics, { once: true, passive: true });
        });
        setTimeout(loadAnalytics, 12000);
      })();
    </script>
  </head>
  <body>
    <div id="root">
      <!--
        PERFORMANCE: Static hero shell.
        Shows INSTANTLY before any JS loads (FCP ~0.5s).
        React replaces this entire div when it mounts.
      -->
      <div class="static-hero" role="banner">
        <div class="static-hero-badge" aria-label="AI-First Marketing Agency">✦ AI-FIRST MARKETING</div>
        <span class="static-hero-sub">Scale Smarter.</span>
        <h1 class="static-hero-h1">Grow Your Brand Faster</h1>
        <div class="static-hero-line" aria-hidden="true"></div>
        <p class="static-hero-p">
          We build high-performing marketing systems that drive
          <span class="hl">real revenue</span>, not just clicks.
        </p>
        <div class="static-hero-btns">
          <a href="#contact" aria-label="Book a Strategy Call with Adibuz">Book a Strategy Call →</a>
          <a href="/insights" aria-label="View Adibuz Marketing Insights">✦ View Insights</a>
        </div>
      </div>
    </div>
    <!--
      Vite entry point — type="module" enables ES module semantics.
      crossorigin="anonymous" is added so the browser uses CORS mode when
      fetching this script and its dynamically-imported chunks. This is
      required for: (a) correct COEP behaviour, (b) error stack traces in
      Sentry/LogRocket when deployed, (c) consistent fetch semantics with
      the rest of the CORS-aware resource pipeline.

      WHY NO SRI HERE: Vite content-hashes every output filename at build
      time (e.g. index-DfpYULix.js). The filename hash IS the integrity
      signal. Additionally, Vite injects chunk preload directives dynamically
      at runtime — applying SRI to those would require a post-build step to
      re-hash every chunk and rewrite index.html, providing negligible benefit
      since Vercel already serves all /assets/* over TLS with immutable cache
      headers and unique per-build filenames.
    -->
    <script type="module" src="/src/main.tsx" crossorigin="anonymous"></script>
  </body>
</html>
